name: Render Images

on:
  issue_comment:
    types: [created]

jobs:
  render:
    # Only run if comment starts with LUMA_IMG:
    if: startsWith(github.event.comment.body, 'LUMA_IMG:')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse comment payload
        id: payload
        run: |
          # Comment format: LUMA_IMG:{"jobId":"...","text":"...","deviceId":"..."}
          COMMENT='${{ github.event.comment.body }}'
          JSON="${COMMENT#LUMA_IMG:}"
          echo "json=$JSON" >> $GITHUB_OUTPUT
          JOB_ID=$(echo "$JSON" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).jobId||'')")
          TEXT=$(echo "$JSON" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).text||'')")
          DEVICE_ID=$(echo "$JSON" | node -e "const d=require('fs').readFileSync('/dev/stdin','utf8');console.log(JSON.parse(d).deviceId||'')")
          echo "jobId=$JOB_ID" >> $GITHUB_OUTPUT
          echo "text=$TEXT" >> $GITHUB_OUTPUT
          echo "deviceId=$DEVICE_ID" >> $GITHUB_OUTPUT

      - name: Generate SVGs with Groq AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          JOB_ID: ${{ steps.payload.outputs.jobId }}
          INPUT_TEXT: ${{ steps.payload.outputs.text }}
          DEVICE_ID: ${{ steps.payload.outputs.deviceId }}
        run: |
          cat << 'SCRIPT' > run.mjs
          import fs from 'fs';

          const jobId    = process.env.JOB_ID;
          const text     = process.env.INPUT_TEXT;
          const deviceId = process.env.DEVICE_ID;

          const prompt = `Return ONLY valid JSON. No explanation. No markdown. No code fences.

          Task: Split the input into separate posts and structure as JSON.

          CRITICAL RULES:
          1. REMOVE any post/section numbering from titles.
          2. Copy every word, emoji, symbol, punctuation EXACTLY.
          3. Wrap IMPORTANT words in **double asterisks** for bold:
             - Zodiac sign names (Aries, Taurus, Gemini, Cancer, Leo, Virgo, Libra, Scorpio, Sagittarius, Capricorn, Aquarius, Pisces)
             - Planet names (Mercury, Venus, Mars, Jupiter, Saturn, Uranus, Neptune)
             - Key power words: strength, love, success, wealth, abundance, growth, clarity
          4. Keep all emojis exactly as they appear.

          Output format (no other text):
          {"posts":[{"title":"title without numbering","content":["line with **bold** words","next line",""]}]}

          Rules:
          - title = first meaningful line, numbering stripped
          - content = remaining lines, one string per element, empty lines become ""
          - Posts separated by blank lines or new numbered sections

          INPUT:
          ${text}

          JSON:`;

          let posts = [];
          try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${process.env.GROQ_API_KEY}`,
                'Content-Type': 'application/json',
                'User-Agent': 'LUMA-App'
              },
              body: JSON.stringify({
                model: 'llama-3.3-70b-versatile',
                messages: [{ role: 'user', content: prompt }],
                max_tokens: 4096,
                temperature: 0.1
              })
            });
            const data = await res.json();
            let raw = data.choices?.[0]?.message?.content || '';
            raw = raw.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/\s*```$/i,'').trim();
            const si = raw.indexOf('{'), ei = raw.lastIndexOf('}');
            if (si !== -1) {
              const p = JSON.parse(raw.slice(si, ei+1));
              posts = Array.isArray(p) ? p : (p.posts || []);
            }
          } catch(e) {
            console.error('AI error:', e.message);
            process.exit(1);
          }

          if (!posts.length) { console.error('No posts parsed'); process.exit(1); }

          const ZODIAC_RE = /(Aries|Taurus|Gemini|Cancer|Leo|Virgo|Libra|Scorpio|Sagittarius|Capricorn|Aquarius|Pisces)/gi;
          const bold = t => t ? t.replace(ZODIAC_RE, '**$1**') : t;
          const clean = t => (t||'').replace(/\*\*/g,'').trim();
          const stripNum = t => (t||'').replace(/^\s*(?:post\s*)?\d+\s*[.:\)]\s*/i,'').replace(/^\s*\(\d+\)\s*/,'').trim();

          posts = posts.map(p => ({
            title:   bold(stripNum(p.title||'')),
            content: (p.content||[]).map(l => l ? bold(l) : l)
          }));

          const EMOJI_FONT = `'Apple Color Emoji','Noto Color Emoji','Segoe UI Emoji'`;
          const BASE_FONT  = `ui-sans-serif,system-ui,-apple-system,sans-serif,${EMOJI_FONT}`;

          function xe(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
          function isWide(ch){const cp=ch.codePointAt(0);return cp>=0x1F000||(cp>=0x4E00&&cp<=0x9FFF)||(cp>=0x3040&&cp<=0x30FF)||(cp>=0xAC00&&cp<=0xD7AF)||(cp>=0x2600&&cp<=0x27FF);}
          function charLen(str){let n=0;for(const c of [...(str||'')])n+=isWide(c)?2:1;return n;}
          function parseBold(text){const segs=[],re=/\*\*(.*?)\*\*/g;let last=0,m;while((m=re.exec(text))!==null){if(m.index>last)segs.push({t:text.slice(last,m.index),bold:false});if(m[1])segs.push({t:m[1],bold:true});last=re.lastIndex;}if(last<text.length)segs.push({t:text.slice(last),bold:false});return segs.filter(s=>s.t);}
          function wrapLatin(text,cpl){const words=text.split(' '),lines=[];let cur='',curLen=0;for(const w of words){const wl=charLen(clean(w)),sep=cur?1:0;if(curLen+sep+wl>cpl&&cur){lines.push(cur);cur=w;curLen=wl;}else{cur=cur?`${cur} ${w}`:w;curLen+=sep+wl;}}if(cur)lines.push(cur);return lines.length?lines:[''];}
          function wrapCJK(text,cpl){const lines=[];let curRaw='',curLen=0,inBold=false;const chars=[...text];let i=0;while(i<chars.length){if(chars[i]==='*'&&chars[i+1]==='*'){curRaw+='**';inBold=!inBold;i+=2;continue;}const ch=chars[i],cl=isWide(ch)?2:1;if(curLen+cl>cpl&&clean(curRaw).length>0){if(inBold)curRaw+='**';lines.push(curRaw);curRaw=inBold?'**'+ch:ch;curLen=cl;}else{curRaw+=ch;curLen+=cl;}i++;}if(clean(curRaw))lines.push(curRaw);return lines.length?lines:[''];}
          function smartWrap(text,cpl){if(!text)return[''];const p=clean(text),sp=(p.match(/ /g)||[]).length,wc=[...p].filter(isWide).length;return(wc>p.length*0.3||(wc>2&&sp<2))?wrapCJK(text,cpl):wrapLatin(text,cpl);}
          function renderLine(px,y,fs,fw,fill,rawText){const segs=parseBold(rawText),hasBold=segs.some(s=>s.bold);if(!hasBold)return `<text x="${px}" y="${y}" font-family="${BASE_FONT}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${xe(clean(rawText))}</text>`;const spans=segs.map(s=>`<tspan font-weight="${s.bold?900:fw}" fill="${s.bold?'#FFFFFF':fill}">${xe(s.t)}</tspan>`).join('');return `<text x="${px}" y="${y}" font-family="${BASE_FONT}" font-size="${fs}" font-weight="${fw}" fill="${fill}" xml:space="preserve">${spans}</text>`;}

          function generateSVG(post) {
            const W=1080,H=1920,PX=110,PY=130,CW=W-PX*2,BOTTOM=H-PY;
            const rawTitle=(post.title||'').trim(),content=post.content||[];
            const visLen=charLen(clean(rawTitle))+charLen(content.map(l=>clean(l||'')).join(''));
            let ts,bs,tlh,blh,gap;
            if(visLen<80){ts=96;bs=62;tlh=134;blh=90;gap=76;}
            else if(visLen<150){ts=86;bs=55;tlh=120;blh=82;gap=68;}
            else if(visLen<260){ts=74;bs=49;tlh=104;blh=72;gap=58;}
            else if(visLen<420){ts=65;bs=44;tlh=92;blh=64;gap=50;}
            else if(visLen<620){ts=55;bs=40;tlh=80;blh=58;gap=44;}
            else if(visLen<900){ts=48;bs=35;tlh=70;blh=50;gap=36;}
            else{ts=41;bs=31;tlh=60;blh=44;gap=32;}
            const tCPL=Math.floor(CW/(ts*0.50)),bCPL=Math.floor(CW/(bs*0.50));
            const titleLines=smartWrap(rawTitle,tCPL);
            const bodyLines=[];
            for(const line of content){const r=line||'';if(!clean(r)){bodyLines.push({raw:'',gap:true});}else{for(const w of smartWrap(r,bCPL))bodyLines.push({raw:w,gap:false});}}
            const titleH=titleLines.length*tlh,bodyH=bodyLines.reduce((s,l)=>s+(l.gap?blh*0.5:blh),0),totalH=titleH+(bodyLines.length?gap+bodyH:0);
            let y=totalH>(H-PY*2)?PY+ts:Math.max(PY+ts,Math.round((H-totalH)/2)+ts);
            const els=[];
            for(const line of titleLines){if(y>BOTTOM+ts)break;els.push(renderLine(PX,y,ts,800,'#FFFFFF',line));y+=tlh;}
            if(bodyLines.length){const ay=y+Math.round(gap*0.28);if(ay<BOTTOM)els.push(`<rect x="${PX}" y="${ay}" width="44" height="4" rx="2" fill="rgba(139,92,246,0.75)"/>`);y+=gap;}
            for(const line of bodyLines){if(!line.gap&&y>BOTTOM+bs)break;if(!line.gap)els.push(renderLine(PX,y,bs,400,'rgba(255,255,255,0.85)',line.raw));y+=line.gap?Math.round(blh*0.5):blh;}
            return `<?xml version="1.0" encoding="UTF-8"?><svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="bg" x1="0" y1="0" x2="${W}" y2="${H}" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#06020f"/><stop offset="55%" stop-color="#080412"/><stop offset="100%" stop-color="#00091a"/></linearGradient><clipPath id="clip"><rect width="${W}" height="${H}"/></clipPath></defs><rect width="${W}" height="${H}" fill="url(#bg)"/><g clip-path="url(#clip)">${els.join('\n')}</g></svg>`;
          }

          const results = posts.map((p,i) => ({
            title:   clean(p.title),
            content: p.content,
            svg:     generateSVG(p),
            index:   i
          }));

          const statusDir = 'api/status';
          if (!fs.existsSync(statusDir)) fs.mkdirSync(statusDir, { recursive: true });

          const statusData = {
            jobId, deviceId,
            status: 'done',
            template: 'imggen',
            total: results.length,
            done:  results.length,
            label: clean(posts[0]?.title||'Session').slice(0,80),
            timestamp: Date.now(),
            results: results.map(r => ({ title: r.title, svg: r.svg, content: r.content }))
          };

          fs.writeFileSync(`${statusDir}/${jobId}.json`, JSON.stringify(statusData));
          console.log(`Written ${results.length} posts to api/status/${jobId}.json`);
          SCRIPT
          node run.mjs

      - name: Commit status file
        run: |
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || git commit -m "job: ${{ steps.payload.outputs.jobId }}"
          git push

      - name: Mark failed on error
        if: failure()
        run: |
          mkdir -p api/status
          echo "{\"status\":\"error\",\"jobId\":\"${{ steps.payload.outputs.jobId }}\",\"error\":\"Image generation failed.\",\"results\":[],\"done\":0,\"total\":0}" > api/status/${{ steps.payload.outputs.jobId }}.json
          git config user.name  "LUMA Bot"
          git config user.email "luma-bot@users.noreply.github.com"
          git add api/status/
          git diff --staged --quiet || git commit -m "job-error: ${{ steps.payload.outputs.jobId }}"
          git push
